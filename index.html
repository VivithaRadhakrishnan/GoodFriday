      cream:"#FAF6F0",sand:"#E8D5B7",gold:"#C9972B",white:"#FFFFFF",
      muted:"#6B7280",dark:"#111827",
    };

    function useInView(ref, threshold=0.15){
      const [v,setV]=useState(false);
      useEffect(()=>{
        const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true);},{threshold});
        if(ref.current)o.observe(ref.current);
        return()=>o.disconnect();
      },[]);
      return v;
    }

    function AnimCount({target,suffix="",duration=2000}){
      const [n,setN]=useState(0);const ref=useRef();const v=useInView(ref);
      useEffect(()=>{
        if(!v)return;let c=0;const s=Math.ceil(target/(duration/16));
        const id=setInterval(()=>{c+=s;if(c>=target){setN(target);clearInterval(id);}else setN(c);},16);
        return()=>clearInterval(id);
      },[v]);
      return React.createElement('span',{ref},n.toLocaleString()+suffix);
    }

    function FadeIn({children,delay=0,className="",style={}}){
      const ref=useRef();const v=useInView(ref);
      return(<div ref={ref} className={className} style={{...style,opacity:v?1:0,transform:v?"translateY(0)":"translateY(32px)",transition:`opacity 0.7s ease ${delay}ms,transform 0.7s ease ${delay}ms`}}>{children}</div>);
    }

    function TimelineItem({ item, idx, onPhotoClick }) {
      const ref = useRef(); const v = useInView(ref, 0.1);

      const handleClick = () => {
        // If there are images, open the gallery
        if (item.images && item.images.length > 0 && item.images[0] !== "") {
          onPhotoClick(item);
        } else {
          // If no images, show the little pop-up alert
          alert("Please click on the next timeline card for images.");
        }
      };

      return (
        <div ref={ref} 
          onClick={handleClick} 
          style={{
            display: "flex", gap: 20, marginBottom: 40, cursor: "pointer", 
            opacity: v ? 1 : 0, transform: v ? "translateX(0)" : "translateX(-30px)",
            transition: `all 0.6s ease ${idx * 60}ms`
          }}
          className="timeline-card"
        >
          <div style={{ flexShrink: 0, width: 56, display: "flex", flexDirection: "column", alignItems: "center" }}>
            <div style={{
              width: 44, height: 44, borderRadius: "50%",
              background: item.highlight ? `linear-gradient(135deg,${C.gold},${C.earth})` : `linear-gradient(135deg,${C.navy},${C.blue})`,
              display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, position: "relative", zIndex: 1
            }}>{item.icon}</div>
          </div>
          <div style={{
            flex: 1, background: item.highlight ? `linear-gradient(135deg,${C.gold}15,${C.earth}10)` : C.white,
            border: `1px solid ${item.highlight ? C.gold + "55" : C.sand}`, borderRadius: 14, padding: "20px 24px",
            transition: "transform 0.2s ease",
            boxShadow: item.highlight ? `0 4px 24px ${C.gold}22` : "0 2px 12px rgba(0,0,0,0.06)"
          }}
          onMouseOver={(e) => e.currentTarget.style.transform = "scale(1.02)"}
          onMouseOut={(e) => e.currentTarget.style.transform = "scale(1)"}
          >
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, alignItems: "baseline", marginBottom: 8 }}>
              <span style={{ background: C.navy, color: C.gold, fontSize: 11, letterSpacing: 2, padding: "3px 10px", borderRadius: 20, fontFamily: "sans-serif" }}>{item.period}</span>
              {item.highlight && <span style={{ background: C.gold, color: C.navy, fontSize: 10, letterSpacing: 1, padding: "3px 10px", borderRadius: 20, fontFamily: "sans-serif", fontWeight: 700 }}>MILESTONE</span>}
              <span style={{ color: C.earth, fontSize: 10, fontWeight: 700 }}>🔍 CLICK FOR PHOTOS</span>
            </div>
            
            <h3 style={{ color: C.navy, fontSize: "1.15rem", margin: "4px 0 10px" }}>{item.title}</h3>
            
            <p style={{ color: "#374151", lineHeight: 1.75, fontSize: "0.95rem", marginBottom: item.stat ? 16 : 0 }}>{item.desc}</p>
            
            {/* 📌 Added statistics display back in */}
            {item.stat && (
              <div style={{ display: "inline-flex", gap: 8, alignItems: "baseline", background: `${C.navy}0A`, borderRadius: 8, padding: "10px 16px" }}>
                <span style={{ color: C.navy, fontSize: "1.6rem", fontWeight: 700 }}>
                  <AnimCount target={item.stat.value} suffix={item.stat.suffix} />
                </span>
                <span style={{ color: C.muted, fontSize: 12, fontFamily: "sans-serif" }}>{item.stat.label}</span>
              </div>
            )}
          </div>
        </div>
      );

    function ImageModal({ item, onClose }) {
  const [index, setIndex] = React.useState(0);
  React.useEffect(() => { setIndex(0); }, [item]);
  if (!item || !item.images || item.images.length === 0) return null;
  const images = item.images;
  const next = (e) => { e.stopPropagation(); setIndex((index + 1) % images.length); };
  const prev = (e) => { e.stopPropagation(); setIndex((index - 1 + images.length) % images.length); };

  return (
    <div onClick={onClose} style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "rgba(11, 37, 69, 0.98)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", cursor: "zoom-out" }}>
      <div style={{ position: "relative", width: "95%", maxWidth: "900px", textAlign: "center" }} onClick={e => e.stopPropagation()}>
        <button onClick={onClose} style={{ position: "absolute", top: -45, right: 10, background: "none", border: "none", color: "white", fontSize: "30px", cursor: "pointer" }}>✕</button>
        
        {/* 📌 Image Container */}
        <div style={{ position: "relative", display: "inline-block", width: "100%" }}>
          <img src={images[index]} alt={item.title} style={{ maxWidth: "100%", maxHeight: "65vh", borderRadius: "12px", border: "3px solid white", boxShadow: "0 20px 50px rgba(0,0,0,0.5)", objectFit: "contain" }} />
        </div>

        {/* 📌 Navigation & Title Area (Always visible on mobile/laptop) */}
        <div style={{ marginTop: "20px", display: "flex", flexDirection: "column", alignItems: "center", gap: "10px" }}>
          <p style={{ color: "white", fontSize: "1.1rem", fontFamily: "Georgia", margin: 0, padding: "0 20px" }}>{item.title}</p>
          
          {images.length > 1 && (
            <div style={{ display: "flex", alignItems: "center", gap: "30px", background: "rgba(255,255,255,0.1)", padding: "8px 20px", borderRadius: "30px" }}>
              <button onClick={prev} style={{ background: "none", border: "none", color: "#4FC3F7", fontSize: "35px", cursor: "pointer", padding: "0 10px" }}>❮</button>
              <span style={{ color: "white", fontSize: "1rem", fontWeight: "bold", minWidth: "50px" }}>{index + 1} / {images.length}</span>
              <button onClick={next} style={{ background: "none", border: "none", color: "#4FC3F7", fontSize: "35px", cursor: "pointer", padding: "0 10px" }}>❯</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
